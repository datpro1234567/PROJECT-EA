{% extends "base.html" %} {% block title %}Sign In - GoodCA{% endblock %} {%
block content %}
<div class="auth-page-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Sign in to your account</p>
    </div>

    <form class="signin-form" id="signin-form" novalidate>
      <div class="form-group">
        <div class="input-wrapper">
          <input
            type="text"
            id="username"
            name="username"
            placeholder=" "
            required
            autocomplete="off"
          />
          <label for="username">Username</label>
          <span class="focus-border"></span>
        </div>
      </div>

      <div class="form-group">
        <div class="input-wrapper password-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            placeholder=" "
            required
            autocomplete="current-password"
          />
          <label for="password">Password</label>
          <button
            type="button"
            class="password-toggle"
            id="passwordToggle"
            aria-label="Toggle password visibility"
          >
            <span class="eye-icon"></span>
          </button>
          <span class="focus-border"></span>
        </div>
        <span class="error-message" id="passwordError"></span>
      </div>

      <div class="form-options">
        <a href="#" class="forgot-password">Forgot password?</a>
      </div>

      <button type="submit" class="auth-btn btn">
        <span class="btn-text">Sign In</span>
        <span class="btn-loader"></span>
      </button>
    </form>

    <div class="signup-link">
      <p>
        Don't have an account?
        <a href="{{ url_for('auth.view_signup') }}">Sign up</a>
      </p>
    </div>
  </div>
</div>
{% endblock %} {% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="{{ url_for('static', filename='js/signin.js') }}"></script>
{% endblock %}

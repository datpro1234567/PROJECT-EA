<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Good Web</title>
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='tree.png') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    <link
      href="https://fonts.googleapis.com/css?family=Inter:400,500,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h2>Welcome Back</h2>
          <p>Sign in to your account</p>
        </div>

        <form class="signin-form" id="signin-form" novalidate>
          <div class="form-group">
            <div class="input-wrapper">
              <input
                type="text"
                id="username"
                name="username"
                placeholder=" "
                required
                autocomplete="off"
              />
              <label for="username">Username</label>
              <span class="focus-border"></span>
            </div>
            <!-- <span class="error-message" id="usernameError"></span> -->
          </div>

          <div class="form-group">
            <div class="input-wrapper password-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                placeholder=" "
                required
                autocomplete="current-password"
              />
              <label for="password">Password</label>
              <button
                type="button"
                class="password-toggle"
                id="passwordToggle"
                aria-label="Toggle password visibility"
              >
                <span class="eye-icon"></span>
              </button>
              <span class="focus-border"></span>
            </div>
            <span class="error-message" id="passwordError"></span>
          </div>

          <div class="form-options">
            </label>
            <a href="#" class="forgot-password">Forgot password?</a>
          </div>

          <button type="submit" class="auth-btn btn">
            <span class="btn-text">Sign In</span>
            <span class="btn-loader"></span>
          </button>
        </form>

        <div class="signup-link">
          <p>Don't have an account? <a href="/signup">Sign up</a></p>
        </div>

        <div class="success-message" id="successMessage">
          <div class="success-icon">✓</div>
          <h3>Sign In Successful!</h3>
          <p>Redirecting to your dashboard...</p>
        </div>
      </div>
    </div>
    <!-- Thêm vào phần <head> hoặc trước </body> -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{{ url_for('static', filename='js/signin.js') }}"></script>
    <!-- <script src="{{ url_for('static', filename='js/form-utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/style.js') }}"></script> -->
  </body>
</html>

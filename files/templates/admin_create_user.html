{% extends "base.html" %}
{% block title %}Thêm người dùng{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Thêm người dùng mới</h1>
</div>
<div class="form-card">
  <form method="POST">
    <div class="form-group">
      <label>Tên đăng nhập *</label>
      <input type="text" name="username" placeholder="vd: nguyen_van_a" required/>
    </div>
    <div class="form-group">
      <label>Mật khẩu *</label>
      <input type="password" name="password" placeholder="Tối thiểu 6 ký tự" required/>
    </div>
    <div class="form-group">
      <label>Vai trò</label>
      <select name="role">
        <option value="customer">Customer (Khách hàng)</option>
        <option value="admin">Admin (Quản trị viên)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Họ và tên</label>
      <input type="text" name="full_name" placeholder="Nguyễn Văn A"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="email@example.com"/>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('admin_users') }}" class="btn btn-ghost">Hủy</a>
      <button type="submit" class="btn btn-primary">Tạo tài khoản</button>
    </div>
  </form>
</div>
{% endblock %}

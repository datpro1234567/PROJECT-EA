{% extends "base.html" %}
{% block title %}Đổi mật khẩu{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Đổi mật khẩu</h1>
</div>
<div class="form-card" style="max-width:480px">
  <form method="POST">
    <div class="form-group">
      <label>Mật khẩu mới *</label>
      <input type="password" name="new_password" placeholder="Tối thiểu 6 ký tự" required minlength="6"/>
    </div>
    <div class="form-group">
      <label>Xác nhận mật khẩu *</label>
      <input type="password" id="confirm_pw" placeholder="Nhập lại mật khẩu" required/>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Hủy</a>
      <button type="submit" class="btn btn-primary" id="submit-pw">Cập nhật</button>
    </div>
  </form>
</div>
<script>
document.querySelector('form').addEventListener('submit', function(e) {
  const pw  = document.querySelector('[name=new_password]').value;
  const cpw = document.getElementById('confirm_pw').value;
  if (pw !== cpw) { e.preventDefault(); alert('Mật khẩu xác nhận không khớp!'); }
});
</script>
{% endblock %}

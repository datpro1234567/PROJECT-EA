<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Inter:400,500,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="signin-card">
        <div class="signin-header">
          <h2>Welcome Back</h2>
          <p>Sign in to your account</p>
        </div>

        <form class="signin-form" id="signinForm" novalidate>
          <div class="form-group">
            <div class="input-wrapper">
              <input
                type="email"
                id="email"
                name="email"
                placeholder=" "
                required
                autocomplete="email"
              />
              <label for="email">Email Address</label>
              <span class="focus-border"></span>
            </div>
            <span class="error-message" id="emailError"></span>
          </div>

          <div class="form-group">
            <div class="input-wrapper password-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                placeholder=" "
                required
                autocomplete="current-password"
              />
              <label for="password">Password</label>
              <button
                type="button"
                class="password-toggle"
                id="passwordToggle"
                aria-label="Toggle password visibility"
              >
                <span class="eye-icon"></span>
              </button>
              <span class="focus-border"></span>
            </div>
            <span class="error-message" id="passwordError"></span>
          </div>

          <div class="form-options">
            <label class="remember-wrapper">
              <input type="checkbox" id="remember" name="remember" />
              <span class="checkbox-label">
                <span class="checkmark"></span>
                Remember me
              </span>
            </label>
            <a href="#" class="forgot-password">Forgot password?</a>
          </div>

          <button type="submit" class="signin-btn btn">
            <span class="btn-text">Sign In</span>
            <span class="btn-loader"></span>
          </button>
        </form>

        <div class="divider">
          <span>or continue with</span>
        </div>

        <div class="social-signin">
          <button type="button" class="social-btn google-btn">
            <span class="social-icon google-icon"></span>
            Google
          </button>
          <button type="button" class="social-btn github-btn">
            <span class="social-icon github-icon"></span>
            GitHub
          </button>
        </div>

        <div class="signup-link">
          <p>Don't have an account? <a href="/signup">Sign up</a></p>
        </div>

        <div class="success-message" id="successMessage">
          <div class="success-icon">✓</div>
          <h3>Sign In Successful!</h3>
          <p>Redirecting to your dashboard...</p>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/form-utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/style.js') }}"></script>
  </body>
</html>

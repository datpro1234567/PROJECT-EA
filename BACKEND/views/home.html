<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Good Web</title>
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='tree.png') }}"
    />
  </head>
  <body style="margin:0; padding:0; background-color:#ffffff; font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
    <h1 style="text-align:center; margin-top:16vh; color:#000000;">
      Hello, {{ session.get('username') or 'User' }}
    </h1>

    <div style="text-align:center; margin-top:24px;">
      <form method="POST" action="/logout" style="display:inline-block; margin-right:16px;">
        <button type="submit" style="padding:8px 16px; font-size:14px; cursor:pointer;">
          Logout
        </button>
      </form>

      {% if session.get('role') == 'admin' %}
      <button
        id="generate-root-keypair-btn"
        type="button"
        style="padding:8px 16px; font-size:14px; cursor:pointer; background-color:#06b6d4; color:#ffffff; border:none; border-radius:4px;"
      >
        Generate Root Key Pair
      </button>
      {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{{ url_for('static', filename='js/home.js') }}"></script>
  </body>
</html>

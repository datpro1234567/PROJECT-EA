<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Good Web</title>
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='tree.png') }}"
    />
  </head>
  <body style="margin:0; padding:0; background-color:#ffffff; font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
    <h1 style="text-align:center; margin-top:16vh; color:#000000;">
      Hello, {{ session.get('username') or 'User' }}
    </h1>

    <div style="text-align:center; margin-top:24px;">
      <form method="POST" action="/logout" style="display:inline-block; margin-right:16px;">
        <button type="submit" style="padding:8px 16px; font-size:14px; cursor:pointer;">
          Logout
        </button>
      </form>

      {% if session.get('role') == 'admin' %}
      <button
        id="generate-root-keypair-btn"
        type="button"
        style="padding:8px 16px; font-size:14px; cursor:pointer;"
      >
        Generate Root Key Pair
      </button>
      <button
        id="generate-root-certificate-btn"
        type="button"
        style="padding:8px 16px; font-size:14px; cursor:pointer;"
      >
        Create Root Certificate
      </button>
      {% endif %}
    </div>

    <div style="max-width:400px; margin:32px auto; padding:16px; border:1px solid #e5e7eb; border-radius:8px;">
      <h2 style="margin-bottom:16px; font-size:18px;">Change Password</h2>
      <form id="change-password-form">
        <div style="margin-bottom:12px; text-align:left;">
          <label for="old_password" style="display:block; margin-bottom:4px; font-size:14px;">Old password</label>
          <input
            type="password"
            id="old_password"
            name="old_password"
            style="width:100%; padding:8px; border:1px solid #d1d5db; border-radius:4px;"
            required
          />
        </div>
        <div style="margin-bottom:12px; text-align:left;">
          <label for="new_password" style="display:block; margin-bottom:4px; font-size:14px;">New password</label>
          <input
            type="password"
            id="new_password"
            name="new_password"
            style="width:100%; padding:8px; border:1px solid #d1d5db; border-radius:4px;"
            required
          />
        </div>
        <div style="margin-bottom:16px; text-align:left;">
          <label for="confirm_password" style="display:block; margin-bottom:4px; font-size:14px;">Confirm new password</label>
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            style="width:100%; padding:8px; border:1px solid #d1d5db; border-radius:4px;"
            required
          />
        </div>
        <button
          type="submit"
          style="padding:8px 16px; font-size:14px; cursor:pointer;"
        >
          Update Password
        </button>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{{ url_for('static', filename='js/home.js') }}"></script>
  </body>
</html>
